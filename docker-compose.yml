version: "3.8"

services:
  app:
    build: .
    container_name: jet_academy_backend

    ports:
      - "8001:8000"

    env_file:
      - .env

    depends_on:
      - redis

    volumes:
      - .:/app
      - /app/node_modules

    restart: unless-stopped

  redis:
    image: redis

    container_name: redis

    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis_data_container:/data

volumes:
  redis_data_container:
